<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Semantic Layout Example</title>
</head>
<body>

  <!-- HEADER: top part of the page -->
  <header>
    <h1>My Website</h1>
    <p>Welcome to my first semantic HTML page</p>
  </header>

  <!-- NAV: navigation links -->
  <nav>
    <a href="#">Home</a> |
    <a href="#">About</a> |
    <a href="#">Contact</a>
  </nav>

  <!-- MAIN: main content of the page -->
  <main>

    <section>
      <h2>About Us</h2>
      <p>
        We are learning HTML5 semantic elements to build better web pages.
      </p>
    </section>

    <section>
      <h2>Our Services</h2>
      <p>
        We create simple and clean websites using HTML, CSS, and JavaScript.
      </p>
    </section>

  </main>

  <!-- FOOTER: bottom of the page -->
  <footer>
    <p>© 2026 My Website. All rights reserved.</p>
  </footer>

</body>
</html>
