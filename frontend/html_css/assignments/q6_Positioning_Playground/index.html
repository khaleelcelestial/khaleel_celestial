<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Playground</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Sticky Navbar -->
    <nav>
        Sticky Navigation Bar
    </nav>

    <main>

        <!-- Section 1 -->
        <section class="section">
            <h2>Static Content Section</h2>
            <p>This is normal static content.</p>

            <!-- Product Card -->
            <div class="card">
                <div class="badge">Sale</div>
                <h3>Product Name</h3>
                <p>Price: $99</p>
            </div>

            <!-- Tooltip -->
            <div class="tooltip-container">
                <span>ℹ️ Info</span>
                <span class="tooltip-text">This is a tooltip message</span>
            </div>
        </section>

        <!-- Section 2 -->
        <section class="section">
            <h2>More Content</h2>
            <p>Scroll down to see sticky, fixed, and other behaviors.</p>
        </section>

        <!-- Section 3 -->
        <section class="section">
            <h2>Even More Content</h2>
            <p>Page has enough height for scrolling demonstration.</p>
        </section>

    </main>

    <!-- Fixed Button -->
    <a href="#" class="back-to-top">Top</a>

</body>
</html>
