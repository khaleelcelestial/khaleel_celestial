<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarterly Sales Report</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <table>

        <caption>Quarterly Sales Report</caption>

        <!-- Table Header -->
        <thead>
            <tr>
                <th scope="col">Product</th>
                <th scope="col">Q1</th>
                <th scope="col">Q2</th>
                <th scope="col">Q3</th>
                <th scope="col">Q4</th>
                <th scope="col">Total</th>
            </tr>
        </thead>

        <!-- Table Body -->
        <tbody>
            <tr>
                <th scope="row">Alpha</th>
                <td>100</td>
                <td>150</td>
                <td>200</td>
                <td>250</td>
                <td>700</td>
            </tr>

            <tr>
                <th scope="row">Beta</th>
                <td>80</td>
                <td>120</td>
                <td>160</td>
                <td>200</td>
                <td>560</td>
            </tr>

            <tr>
                <th scope="row">Gamma</th>
                <td>90</td>
                <td>140</td>
                <td>180</td>
                <td>220</td>
                <td>630</td>
            </tr>

            <!-- Total Row -->
            <tr>
                <th scope="row">Total</th>
                <td>270</td>
                <td>410</td>
                <td>540</td>
                <td>670</td>
                <td>1890</td>
            </tr>
        </tbody>

        <!-- Table Footer -->
        <tfoot>
            <tr>
                <th scope="row" colspan="5">Grand Total</th>
                <td>1890</td>
            </tr>
        </tfoot>

    </table>

</body>
</html>
