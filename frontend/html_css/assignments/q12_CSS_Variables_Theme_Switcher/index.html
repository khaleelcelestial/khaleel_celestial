<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <h1>My App</h1>
        <button onclick="document.body.classList.toggle('dark-theme')">
            Toggle Theme
        </button>
    </nav>

    <!-- Main -->
    <main>
        <section class="card">
            <h2>Card Title</h2>
            <p>This is a sample card demonstrating theming.</p>
            <button>Primary Button</button>
        </section>

        <section class="card">
            <h2>Another Card</h2>
            <p>All components respond to theme change.</p>
            <button>Click Me</button>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Theme App</p>
    </footer>

</body>
</html>
