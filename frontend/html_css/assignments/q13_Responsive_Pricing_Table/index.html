<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Table</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="pricing">

        <!-- Basic -->
        <article class="card">
            <h2>Basic</h2>
            <p class="price">$9/mo</p>

            <ul class="features">
                <li class="yes">1 User</li>
                <li class="yes">Basic Support</li>
                <li class="no">Analytics</li>
                <li class="no">Custom Features</li>
            </ul>

            <button>Choose Plan</button>
        </article>

        <!-- Pro (Highlighted) -->
        <article class="card pro">
            <h2>Pro</h2>
            <p class="price">$29/mo</p>

            <ul class="features">
                <li class="yes">5 Users</li>
                <li class="yes">Priority Support</li>
                <li class="yes">Analytics</li>
                <li class="no">Custom Features</li>
            </ul>

            <button>Choose Plan</button>
        </article>

        <!-- Enterprise -->
        <article class="card">
            <h2>Enterprise</h2>
            <p class="price">$99/mo</p>

            <ul class="features">
                <li class="yes">Unlimited Users</li>
                <li class="yes">24/7 Support</li>
                <li class="yes">Advanced Analytics</li>
                <li class="yes">Custom Features</li>
            </ul>

            <button>Choose Plan</button>
        </article>

    </section>

</body>
</html>
