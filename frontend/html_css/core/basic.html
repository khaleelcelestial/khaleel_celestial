<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character encoding -->
  <meta charset="UTF-8">

  <!-- Makes page responsive on mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page description for search engines -->
  <meta name="description" content="My first HTML page demonstrating meta tags, block vs inline elements, CSS, and JavaScript.">

  <!-- Page title (browser tab) -->
  <title>My First Page</title>

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Main heading -->
  <h1>Hello, World!</h1>

  <!-- Paragraph -->
  <p>This is a paragraph of text on my first web page.</p>

  <!-- Block elements -->
  <div style="background: lightblue; margin: 4px;">Block 1</div>
  <div style="background: lightcoral; margin: 4px;">Block 2</div>

  <!-- Inline elements inside a paragraph -->
  <p>
    This is a paragraph with
    <span style="color: red;">red text</span>
    and
    <span style="font-weight: bold;">bold text</span>
    inside it.
  </p>

  <!-- JavaScript (loaded after HTML is parsed) -->
  <script src="app.js" defer></script>

</body>
</html>
