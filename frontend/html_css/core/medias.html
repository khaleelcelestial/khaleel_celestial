<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid + Flex Responsive Layout</title>

  <style>
    /* -------- GRID LAYOUT -------- */
    .container {
      display: grid;
      grid-template-columns: 3fr 1fr; /* Desktop: 2 columns */
      gap: 16px;
      padding: 16px;
    }

    /* -------- FLEXBOX INSIDE GRID -------- */
    .main {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #e3f2fd;
      padding: 16px;
    }

    .card {
      background: #90caf9;
      padding: 10px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fce4ec;
      padding: 16px;
    }

    /* -------- MEDIA QUERY (MOBILE) -------- */
    @media (max-width: 600px) {
      .container {
        grid-template-columns: 1fr; /* Mobile: 1 column */
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="main">
      <div class="card">Main Content 1</div>
      <div class="card">Main Content 2</div>
      <div class="card">Main Content 3</div>
    </div>

    <div class="sidebar">
      <div class="card">Sidebar Item 1</div>
      <div class="card">Sidebar Item 2</div>
    </div>
  </div>

</body>
</html>
