<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Registration Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">
    <h1>Create Account</h1>

    <form id="form" novalidate>

      <!-- Name -->
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Alice Smith" />
        <span class="error" id="name-error"></span>
      </div>

      <!-- Email -->
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="alice@mail.com" />
        <span class="error" id="email-error"></span>
      </div>

      <!-- Phone -->
      <div class="field">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="10-digit number" />
        <span class="error" id="phone-error"></span>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min 8 characters" />
        <div class="strength-bar">
          <div id="strength-fill"></div>
        </div>
        <span class="strength-label" id="strength-label"></span>
        <span class="error" id="password-error"></span>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Repeat password" />
        <span class="error" id="confirm-error"></span>
      </div>

      <!-- Age -->
      <div class="field">
        <label for="age">Age</label>
        <input type="number" id="age" name="age" placeholder="18 – 120" />
        <span class="error" id="age-error"></span>
      </div>

      <button type="submit">Register</button>

    </form>

    <!-- JSON output shown after valid submit -->
    <pre id="output" class="hidden"></pre>
  </div>

  <script src="form.js"></script>

</body>
</html>
