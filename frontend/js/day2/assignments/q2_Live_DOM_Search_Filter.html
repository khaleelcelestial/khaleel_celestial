<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search Cards Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 300px;
      margin-bottom: 20px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
    }

    .hidden {
      display: none;
    }

    #no-results {
      color: red;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- Search Input -->
  <input id="search" placeholder="Search..." />

  <!-- Cards -->
  <div id="cards">
    <div class="card">
      <h3>JavaScript Basics</h3>
      <p>Learn variables and functions</p>
    </div>

    <div class="card">
      <h3>CSS Grid</h3>
      <p>Master grid layouts</p>
    </div>

    <div class="card">
      <h3>React Hooks</h3>
      <p>useState and useEffect</p>
    </div>
  </div>

  <!-- No Results Message -->
  <p id="no-results" class="hidden">No results found</p>

  <!-- JavaScript -->
  <script>
    const searchInput = document.querySelector("#search");
    const cards = document.querySelectorAll("#cards .card");
    const noResults = document.querySelector("#no-results");

    searchInput.addEventListener("input", (e) => {
      const query = e.target.value.trim().toLowerCase();
      let matchCount = 0;

      cards.forEach((card) => {
        const matches =
          query === "" ||
          card.textContent.toLowerCase().includes(query);

        card.classList.toggle("hidden", !matches);

        if (matches) matchCount++;
      });

      noResults.classList.toggle(
        "hidden",
        matchCount > 0 || query === ""
      );
    });
  </script>

</body>
</html>
